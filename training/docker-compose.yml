version: '3.8'

services:
  # Single GPU Training
  hsm2-training:
    build:
      context: ..
      dockerfile: training/Dockerfile
    image: hsm2-training:latest
    container_name: hsm2-training
    
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=2
    
    volumes:
      - ./training_data:/workspace/hsm2/training_data
      - ./checkpoints:/workspace/hsm2/checkpoints
      - ./logs:/workspace/hsm2/logs
    
    ports:
      - "6006:6006"  # TensorBoard
      - "11434:11434" # Ollama
    
    command: >
      bash -c "
        ollama serve &
        sleep 10
        ollama pull hf.co/yourGGUF/heretic_HelpingAI-3B-coder_GGUF:BF16
        ./training/scripts/start_training.sh
      "
    
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Multi-GPU Distributed Training
  hsm2-training-multi:
    build:
      context: ..
      dockerfile: training/Dockerfile
    image: hsm2-training:latest
    container_name: hsm2-training-multi
    
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_NUM_PARALLEL=8
      - OLLAMA_MAX_LOADED_MODELS=4
      - RAY_ADDRESS=auto
    
    volumes:
      - ./training_data:/workspace/hsm2/training_data
      - ./checkpoints:/workspace/hsm2/checkpoints
      - ./logs:/workspace/hsm2/logs
    
    ports:
      - "6006:6006"
      - "11434:11434"
      - "6379:6379"  # Ray
    
    command: >
      bash -c "
        ollama serve &
        sleep 10
        ollama pull hf.co/yourGGUF/heretic_HelpingAI-3B-coder_GGUF:BF16
        ./training/scripts/start_training.sh training/config/training_config.json all
      "
    
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # TensorBoard Only (for viewing existing logs)
  tensorboard:
    image: tensorflow/tensorflow:latest
    container_name: hsm2-tensorboard
    
    volumes:
      - ./training_data:/logs
    
    ports:
      - "6006:6006"
    
    command: tensorboard --logdir=/logs --host=0.0.0.0 --port=6006

  # Ollama Only (for external training)
  ollama:
    image: ollama/ollama:latest
    container_name: hsm2-ollama
    
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=2
    
    volumes:
      - ollama-models:/root/.ollama
    
    ports:
      - "11434:11434"

volumes:
  ollama-models:
