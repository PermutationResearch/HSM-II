<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSM-II Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
      (function() {
        const saved = localStorage.getItem('hsm_theme');
        const systemPrefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
        const theme = saved || (systemPrefersLight ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <style>
        :root {
            --bg: #0f141a;
            --panel: #141d27;
            --border: rgba(161, 182, 205, 0.22);
            --accent: #1f9a76;
            --accent2: #39b08f;
            --text: #d7e1ec;
            --text-dim: #7f95ad;
            --text-bright: #edf3fa;
            --red: #e05a5a;
            --green: #4ecf7e;
        }
        html[data-theme='light'] {
            --bg: #f5f3ee;
            --panel: #fffdf8;
            --border: rgba(17, 20, 24, 0.16);
            --accent: #1f9a76;
            --accent2: #2f8f74;
            --text: #1a222b;
            --text-dim: #6b7a89;
            --text-bright: #0f141a;
        }
        html { color-scheme: dark; }
        html[data-theme='light'] { color-scheme: light; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', system-ui, sans-serif;
            font-size: 14px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #header {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        #header h1 {
            font-size: 16px;
            color: var(--accent);
            font-weight: 600;
            font-family: 'Doto', 'Space Grotesk', system-ui, sans-serif;
        }
        #header .status {
            font-size: 12px;
            color: var(--text-dim);
        }
        #header .status.connected { color: var(--green); }
        #header .status.disconnected { color: var(--red); }
        
        #main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        
        #sidebar {
            width: 260px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 16px;
        }
        #sidebar h2 {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 12px;
            letter-spacing: 0.1em;
        }
        .conversation {
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 4px;
            font-size: 13px;
            color: var(--text);
            transition: background 0.15s;
        }
        .conversation:hover { background: var(--border); }
        .conversation.active { background: var(--accent); color: white; }
        
        #new-chat-btn {
            margin-top: auto;
            padding: 10px;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
        }
        #new-chat-btn:hover { opacity: 0.9; }
        
        #chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
        }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.assistant { align-self: flex-start; }
        
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .message.user .avatar { background: var(--accent); }
        .message.assistant .avatar { background: var(--accent2); color: var(--bg); }
        
        .bubble {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            line-height: 1.6;
        }
        .message.user .bubble {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        
        .bubble pre {
            background: var(--bg);
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin-top: 8px;
            font-size: 12px;
        }
        
        #input-area {
            border-top: 1px solid var(--border);
            padding: 16px 24px;
            background: var(--panel);
        }
        
        #input-container {
            display: flex;
            gap: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 4px;
        }
        
        #message-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 16px;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            resize: none;
            min-height: 24px;
            max-height: 200px;
        }
        
        #send-btn {
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            padding: 8px 16px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
        }
        #send-btn:hover:not(:disabled) { opacity: 0.9; }
        #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #theme-toggle {
            margin-left: 10px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 11px;
            font-family: 'Space Mono', ui-monospace, monospace;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
        }
        
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        #api-key-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            width: 400px;
        }
        .modal-content h2 {
            margin-bottom: 16px;
            color: var(--text-bright);
        }
        .modal-content input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            color: var(--text);
            font-family: inherit;
            margin-bottom: 16px;
        }
        .modal-content button {
            width: 100%;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            padding: 12px;
            color: white;
            font-family: inherit;
            cursor: pointer;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="api-key-modal">
        <div class="modal-content">
            <h2>Enter API Key</h2>
            <input type="password" id="api-key-input" placeholder="hsk_...">
            <button onclick="authenticate()">Connect</button>
        </div>
    </div>

    <div id="header">
        <h1>HSM-II</h1>
        <div style="display:flex;align-items:center;">
            <span class="status disconnected" id="connection-status">Disconnected</span>
            <button id="theme-toggle" type="button">[ MODE: DARK ]</button>
        </div>
    </div>
    
    <div id="main">
        <div id="sidebar">
            <h2>Conversations</h2>
            <div id="conversations">
                <div class="conversation active">New Conversation</div>
            </div>
            <button id="new-chat-btn" onclick="newConversation()">+ New Chat</button>
        </div>
        
        <div id="chat-area">
            <div id="messages"></div>
            
            <div id="input-area">
                <div id="input-container">
                    <textarea id="message-input" placeholder="Type a message..." rows="1"></textarea>
                    <button id="send-btn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let jwtToken = localStorage.getItem('hsm_jwt');
        const THEME_KEY = 'hsm_theme';

        function resolveTheme() {
            const saved = localStorage.getItem(THEME_KEY);
            if (saved === 'dark' || saved === 'light') return saved;
            const systemPrefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
            return systemPrefersLight ? 'light' : 'dark';
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem(THEME_KEY, theme);
            const btn = document.getElementById('theme-toggle');
            if (btn) btn.textContent = theme === 'light' ? '[ MODE: LIGHT ]' : '[ MODE: DARK ]';
        }

        applyTheme(resolveTheme());
        const themeBtn = document.getElementById('theme-toggle');
        if (themeBtn) {
            themeBtn.addEventListener('click', function() {
                const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
                applyTheme(next);
            });
        }
        
        if (jwtToken) {
            document.getElementById('api-key-modal').classList.add('hidden');
            document.getElementById('connection-status').textContent = 'Connected';
            document.getElementById('connection-status').className = 'status connected';
        }

        async function authenticate() {
            const key = document.getElementById('api-key-input').value.trim();
            if (!key) return;
            
            // In real implementation, this would call the auth endpoint
            localStorage.setItem('hsm_jwt', 'demo_token');
            location.reload();
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;
            
            input.value = '';
            addMessage('user', text);
            
            // Demo response - in real app, call API
            setTimeout(() => {
                addMessage('assistant', 'This is a demo response. Connect the backend to enable real AI responses.');
            }, 500);
        }

        function addMessage(role, content) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <div class="avatar">${role === 'user' ? 'You' : 'AI'}</div>
                <div class="bubble">${content}</div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function newConversation() {
            document.getElementById('messages').innerHTML = '';
        }
    </script>
</body>
</html>
