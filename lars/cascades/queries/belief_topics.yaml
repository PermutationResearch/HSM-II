cascade_id: belief_topics
description: |
  Auto-discover topical clusters in the system's belief space.
  Groups beliefs by emergent topic using LARS TOPICS operator.

cells:
  - name: topic_clusters
    type: sql_data
    tool_inputs:
      query: |
        SELECT
          TOPICS(content, {{ inputs.n_topics | default(6) }}) AS topic,
          COUNT(*)                   AS belief_count,
          ROUND(AVG(confidence), 3)  AS avg_confidence,
          MAX(update_count)          AS max_updates
        FROM hyper_stigmergy.beliefs
        WHERE confidence > 0.3
        GROUP BY topic
        ORDER BY belief_count DESC

  - name: topic_summary
    type: sql_data
    tool_inputs:
      query: |
        SELECT
          content,
          confidence,
          source,
          TOPICS(content, {{ inputs.n_topics | default(6) }}) AS topic
        FROM hyper_stigmergy.beliefs
        WHERE confidence > 0.4
        ORDER BY topic, confidence DESC

  - name: synthesis
    instructions: |
      The hyper-stigmergic system has generated {{ inputs.n_topics | default(6) }} belief clusters.

      Topic distribution:
      {{ outputs.topic_clusters }}

      Representative beliefs per topic:
      {{ outputs.topic_summary }}

      Interpret what these belief clusters reveal about the system's emergent self-model.
      Which topics dominate? Are there contradictions across clusters?
      What does this suggest about the system's current evolutionary trajectory?
    context:
      from: [topic_clusters, topic_summary]
    takes:
      factor: 2
      evaluator_instructions: "Pick the interpretation that is most grounded in the actual data"
