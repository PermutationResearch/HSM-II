cascade_id: improvement_analysis
description: |
  Semantic analysis of the system's self-improvement history.
  Finds mutations similar to a given intent and ranks by coherence impact.

cells:
  - name: query_improvements
    type: sql_data
    tool_inputs:
      query: |
        SELECT
          event_idx,
          intent,
          mutation_type,
          ROUND(coherence_before, 4)       AS coh_before,
          ROUND(coherence_after, 4)        AS coh_after,
          ROUND(coherence_after - coherence_before, 4) AS delta,
          ROUND(novelty_score, 3)          AS novelty,
          applied,
          datetime(timestamp, 'unixepoch') AS at
        FROM hyper_stigmergy.improvement_events
        WHERE intent SIMILAR_TO '{{ inputs.intent | default("structural rebalancing") }}'
        ORDER BY delta DESC
        LIMIT 25

  - name: pattern_analysis
    instructions: |
      You are analyzing self-improvement cycles of a hyper-stigmergic multi-agent system.
      These are improvement events semantically similar to "{{ inputs.intent }}":

      {{ outputs.query_improvements }}

      Identify:
      1. Which mutation types produced the highest coherence gains
      2. Whether novelty correlates with positive or negative coherence delta
      3. Any recurring patterns or anti-patterns in the improvement history
      4. Recommendations for the next improvement cycle intent
    context:
      from: [query_improvements]
    takes:
      factor: 2
      evaluator_instructions: "Pick the analysis with the most specific, actionable recommendations"
