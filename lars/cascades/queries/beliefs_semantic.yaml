cascade_id: beliefs_semantic
description: |
  Semantic search over the system's belief table.
  Finds beliefs matching a meaning, groups by topic, or checks contradictions.

cells:
  - name: search_beliefs
    type: sql_data
    tool_inputs:
      query: |
        SELECT
          belief_id,
          content,
          confidence,
          source,
          datetime(created_at, 'unixepoch') AS created,
          update_count
        FROM hyper_stigmergy.beliefs
        WHERE content MEANS '{{ inputs.topic | default("system is plateauing") }}'
        ORDER BY confidence DESC
        LIMIT 20

  - name: summarize
    instructions: |
      You are analyzing the belief system of a self-evolving multi-agent hypergraph.
      Here are the beliefs that semantically match "{{ inputs.topic }}":

      {{ outputs.search_beliefs }}

      Summarize what these beliefs reveal about the system's current self-model.
      Note patterns in confidence levels and sources (Reflection, Experience, Observation).
    context:
      from: [search_beliefs]
