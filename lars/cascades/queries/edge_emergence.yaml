cascade_id: edge_emergence
description: |
  Semantic analysis of hyperedge emergence patterns.
  Identifies which structural connections are truly emergent vs seeded.

cells:
  - name: edge_stats
    type: sql_data
    tool_inputs:
      query: |
        SELECT
          edge_idx,
          participants,
          ROUND(weight, 3)            AS weight,
          emergent,
          age,
          datetime(created_at, 'unixepoch') AS created,
          scope,
          origin_system
        FROM hyper_stigmergy.hyper_edges
        WHERE snapshot_id = (SELECT MAX(snapshot_id) FROM hyper_stigmergy.hyper_edges)
        ORDER BY emergent DESC, weight DESC
        LIMIT 50

  - name: emergence_summary
    type: sql_data
    tool_inputs:
      query: |
        SELECT
          emergent,
          COUNT(*)            AS edge_count,
          ROUND(AVG(weight), 3) AS avg_weight,
          ROUND(AVG(age), 1)    AS avg_age,
          MIN(age)              AS youngest,
          MAX(age)              AS oldest
        FROM hyper_stigmergy.hyper_edges
        WHERE snapshot_id = (SELECT MAX(snapshot_id) FROM hyper_stigmergy.hyper_edges)
        GROUP BY emergent

  - name: analysis
    instructions: |
      Analyze the hyperedge structure of a self-organizing multi-agent system.

      Edge statistics:
      {{ outputs.edge_stats }}

      Emergence summary:
      {{ outputs.emergence_summary }}

      Assess:
      - The ratio of emergent to seeded edges and what it indicates about system maturity
      - Weight distribution patterns (are high-weight edges emergent or seeded?)
      - Age patterns (are emergent edges older or newer on average?)
      - Structural health indicators
      - Recommendations for the next link or improve cycle
    context:
      from: [edge_stats, emergence_summary]
